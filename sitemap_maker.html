<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sitemap Generator | Suman Dangal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; min-height: 100vh; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    h1 { font-size: 2rem; margin-bottom: .5rem; }
    p  { color: #94a3b8; margin-bottom: 2rem; font-size: .95rem; }
    button { padding: 14px 36px; font-size: 1rem; cursor: pointer; background: #2d6a4f; color: white; border: none; border-radius: 8px; transition: background .2s; font-weight: 600; letter-spacing: .03em; }
    button:hover { background: #1b4332; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    #log { margin-top: 2rem; width: 100%; max-width: 560px; background: #1e293b; border-radius: 10px; padding: 1.2rem 1.4rem; font-family: monospace; font-size: .82rem; color: #94a3b8; line-height: 1.8; min-height: 60px; text-align: left; }
    .ok  { color: #4ade80; }
    .err { color: #f87171; }
    .inf { color: #60a5fa; }
  </style>
</head>
<body>
  <h1>🗺️ Sitemap Generator</h1>
  <p>Fetches your live blog posts from Google Sheets and builds <code>sitemap.xml</code></p>
  <button id="genBtn" onclick="generateSitemap()">Generate &amp; Download sitemap.xml</button>
  <div id="log">Ready — click the button above.</div>

<script>
/* ── CONFIG ── */
const DOMAIN       = 'https://suman-dangal.com.np';
const BLOG_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRQuOox7oJ5frLVTIRzed1hVjUgfa6E0w7RKmAX2CXKmC3RdcPQCgb1jBtdLec8vugpRiYT3_zqH6Qc/pub?gid=1132024800&single=true&output=csv';

const STATIC_ROUTES = [
  { path: '/',           priority: '1.0', freq: 'weekly'  },
  { path: '/about',      priority: '0.8', freq: 'monthly' },
  { path: '/projects',   priority: '0.9', freq: 'weekly'  },
  { path: '/skills',     priority: '0.8', freq: 'monthly' },
  { path: '/experience', priority: '0.8', freq: 'monthly' },
  { path: '/blog',       priority: '0.9', freq: 'daily'   },
  { path: '/contact',    priority: '0.7', freq: 'yearly'  },
];

/* ── PROPER CSV PARSER (handles quoted fields + commas inside quotes) ── */
function parseCSV(raw) {
  /* normalise line endings */
  const lines = raw.trim().split(/\r?\n/);
  if (lines.length < 2) return [];

  const splitRow = line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur);
    return cols.map(s => s.replace(/^"|"$/g, '').replace(/""/g, '"').trim());
  };

  const headers = splitRow(lines[0]).map(h => h.toLowerCase());
  return lines.slice(1).map(line => {
    const vals = splitRow(line);
    const obj  = {};
    headers.forEach((h, i) => { obj[h] = vals[i] ?? ''; });
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

/* ── DATE NORMALISER → always produces YYYY-MM-DD ── */
function toISODate(raw) {
  const today = new Date().toISOString().split('T')[0];
  if (!raw) return today;
  /* already YYYY-MM-DD */
  if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
  /* "April 20, 2026" or "April 20 2026" etc. */
  const d = new Date(raw);
  if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
  return today;
}

/* ── XML HELPERS ── */
const urlEntry = (loc, lastmod, freq, priority) =>
  `  <url>\n    <loc>${loc}</loc>\n    <lastmod>${lastmod}</lastmod>\n    <changefreq>${freq}</changefreq>\n    <priority>${priority}</priority>\n  </url>`;

/* ── LOG HELPER ── */
const logEl = document.getElementById('log');
function log(msg, cls = '') {
  logEl.innerHTML += `<div class="${cls}">${msg}</div>`;
}
function clearLog() { logEl.innerHTML = ''; }

/* ── MAIN ── */
async function generateSitemap() {
  const btn   = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerText = 'Working…';
  clearLog();

  const today = new Date().toISOString().split('T')[0];

  log(`<span class="inf">📅 Date: ${today}</span>`);
  log(`<span class="inf">🌐 Domain: ${DOMAIN}</span>`);
  log('');

  /* — Static pages — */
  const entries = [];
  STATIC_ROUTES.forEach(r => {
    entries.push(urlEntry(`${DOMAIN}${r.path}`, today, r.freq, r.priority));
    log(`<span class="ok">✓</span> ${r.path}`);
  });

  /* — Blog posts from Sheet — */
  log('');
  log(`<span class="inf">⬇️  Fetching blog CSV…</span>`);
  try {
    const res = await fetch(BLOG_CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();

    const rows = parseCSV(text);
    log(`<span class="inf">📄 ${rows.length} rows found in sheet</span>`);

    let added = 0;
    rows.forEach(row => {
      const slug = (row['slug'] || '').trim();
      if (!slug) return;
      const date = toISODate(row['date'] || '');
      entries.push(urlEntry(`${DOMAIN}/blog/${slug}`, date, 'monthly', '0.8'));
      log(`<span class="ok">✓</span> /blog/${slug} <span style="color:#64748b">(${date})</span>`);
      added++;
    });

    log('');
    log(`<span class="ok">✅ ${added} blog posts added</span>`);
  } catch (err) {
    log(`<span class="err">❌ Error fetching sheet: ${err.message}</span>`);
    log(`<span class="err">   Make sure the CSV link is public (Anyone with the link).</span>`);
  }

  /* — Build XML — */
  const xml =
    `<?xml version="1.0" encoding="UTF-8"?>\n` +
    `<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n` +
    entries.join('\n') + '\n' +
    `</urlset>`;

  /* — Download — */
  const blob = new Blob([xml], { type: 'application/xml' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'sitemap.xml';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  log('');
  log(`<span class="ok">⬇️  sitemap.xml downloaded — ${entries.length} total URLs</span>`);
  log(`<span class="inf">📌 Upload it to the root of your site: ${DOMAIN}/sitemap.xml</span>`);

  btn.disabled  = false;
  btn.innerText = '✅ Done — click to regenerate';
}
</script>
</body>
</html>
